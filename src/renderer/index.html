<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenOmniClaw</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel control-panel" aria-labelledby="app-title">
        <p class="eyebrow">Floating Window Demo</p>
        <h1 id="app-title">OpenOmniClaw</h1>
        <p class="lede">
          小猫悬浮窗状态机演示。主面板只发出任务状态事件，悬浮窗负责动画、拖拽和贴边。
        </p>

        <div class="control-cluster" aria-label="小猫悬浮窗控制">
          <button class="primary-action" type="button" data-cat-action="show">显示小猫</button>
          <button class="secondary-action" type="button" data-cat-action="hide">隐藏小猫</button>
        </div>

        <div class="state-board" aria-label="任务状态切换">
          <button type="button" data-cat-state="preparing">
            <span>准备</span>
            <small>ready task</small>
          </button>
          <button type="button" data-cat-state="running">
            <span>执行中</span>
            <small>doing task</small>
          </button>
          <button type="button" data-cat-state="completed">
            <span>完成</span>
            <small>finish</small>
          </button>
          <button type="button" data-cat-state="idle">
            <span>空闲</span>
            <small>idle</small>
          </button>
        </div>
      </section>

      <section class="panel status-panel" aria-labelledby="status-title">
        <div class="section-heading">
          <p class="eyebrow">Runtime</p>
          <h2 id="status-title">应用状态</h2>
        </div>

        <dl class="status-grid">
          <div>
            <dt>Electron App</dt>
            <dd id="app-version">读取中</dd>
          </div>
          <div>
            <dt>Cat Window</dt>
            <dd id="cat-visible">Hidden</dd>
          </div>
          <div>
            <dt>Cat State</dt>
            <dd id="cat-state">hidden</dd>
          </div>
          <div>
            <dt>Bounds</dt>
            <dd id="cat-bounds">--</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
