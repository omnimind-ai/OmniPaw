<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenOmniClaw Cat Panel</title>
    <link rel="stylesheet" href="./cat-panel.css" />
    <script src="./cat-panel.js" defer></script>
  </head>
  <body>
    <main class="cat-panel" id="cat-panel" data-side="right" aria-label="小猫快捷面板">
      <div class="panel-pointer" aria-hidden="true"></div>
      <section class="panel-card">
        <p class="eyebrow">Cat Panel</p>
        <h1>快捷控制</h1>
        <p class="summary">右键小猫打开，面板会根据屏幕剩余空间自动选择左侧或右侧。</p>

        <div class="quick-grid" aria-label="快捷动作">
          <button type="button">继续任务</button>
          <button type="button">查看日志</button>
          <button type="button">暂停</button>
          <button type="button">收起</button>
        </div>

        <dl class="placement">
          <div>
            <dt>展开方向</dt>
            <dd id="panel-side">右侧</dd>
          </div>
          <div>
            <dt>布局模式</dt>
            <dd>独立窗口</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
