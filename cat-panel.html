<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenOmniClaw Cat Panel</title>
    <link rel="stylesheet" href="./cat-panel.css" />
    <script type="module" src="/src/catwindow/cat-panel.ts"></script>
  </head>
  <body>
    <main
      class="cat-panel"
      id="cat-panel"
      data-side="right"
      aria-label="小猫快捷面板"
    >
      <div
        class="panel-pointer"
        aria-hidden="true"
      ></div>
      <section class="panel-card">
        <p class="eyebrow">Cat Panel</p>
        <h1>快捷控制</h1>
        <p class="summary">右键小猫打开，面板会根据屏幕剩余空间自动选择左侧或右侧。</p>

        <div
          class="quick-grid"
          aria-label="快捷动作"
        >
          <button
            type="button"
            data-cat-state="idle"
          >
            <span>待命</span>
            <small>idle</small>
          </button>
          <button
            type="button"
            data-cat-state="preparing"
          >
            <span>准备</span>
            <small>preparing</small>
          </button>
          <button
            type="button"
            data-cat-state="running"
          >
            <span>执行中</span>
            <small>running</small>
          </button>
          <button
            type="button"
            data-cat-state="completed"
          >
            <span>完成</span>
            <small>completed</small>
          </button>
          <button
            type="button"
            data-cat-action="hide"
          >
            <span>收起</span>
            <small>hide</small>
          </button>
        </div>

        <dl class="placement">
          <div>
            <dt>展开方向</dt>
            <dd id="panel-side">右侧</dd>
          </div>
          <div>
            <dt>布局模式</dt>
            <dd>独立窗口</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
