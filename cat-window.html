<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: omnipaw-cat-asset:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniPaw Cat</title>
    <link rel="stylesheet" href="./cat-window.css" />
    <script type="module" src="/src/catwindow/cat-window.ts"></script>
  </head>
  <body>
    <main class="cat-surface" aria-label="OmniPaw 小猫悬浮窗">
      <button
        class="cat-stage"
        id="cat-stage"
        type="button"
        aria-label="拖动小猫悬浮窗"
      >
        <span
          class="cat-image-frame"
          id="cat-image-frame"
        >
          <img
            id="cat-image"
            alt=""
            draggable="false"
          />
        </span>
      </button>
    </main>
  </body>
</html>
